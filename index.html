<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1"
  />
  <title>Senior Badminton Tournament 2026 - Live Display</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Roboto+Mono:wght@400;600;800&family=Barlow:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-left">
        <h1>Senior Badminton Tournament 2026</h1>
        <h2>Live Court Display</h2>
      </div>
      <div class="header-right">
        <div class="clock" id="clock"></div>
        <div class="rotation-label">
          <span id="current-division-label"></span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="main-left">
        <div class="iframe-wrapper">
          <iframe
            id="sheet-frame"
            title="Tournament Sheet"
            loading="lazy"
            referrerpolicy="no-referrer"
          ></iframe>
        </div>
      </section>

      <section class="main-right">
        <div class="panel-title">On Deck</div>
        <div class="on-deck-list" id="on-deck-list">
          <!-- Filled by JS -->
        </div>
        <div class="rotation-info">
          <div>Auto‑rotating through divisions every <span id="rotation-seconds-label"></span> seconds.</div>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
